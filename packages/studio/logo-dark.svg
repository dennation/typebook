<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- Studio frame -->
  <rect x="4" y="4" width="112" height="112" rx="20" stroke="#ededed" stroke-width="5"/>

  <!-- Variant cards — asymmetric bento grid -->
  <!-- Top-left: light card -->
  <rect x="18" y="18" width="44" height="34" rx="8" fill="#ededed"/>
  <!-- Top-right: muted card -->
  <rect x="68" y="18" width="34" height="34" rx="8" fill="#666666"/>
  <!-- Bottom-left: muted card -->
  <rect x="18" y="58" width="34" height="44" rx="8" fill="#666666"/>
  <!-- Bottom-right: light card -->
  <rect x="58" y="58" width="44" height="44" rx="8" fill="#ededed"/>
</svg>
