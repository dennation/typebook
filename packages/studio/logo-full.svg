<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 120" fill="none">
  <!-- === Logomark === -->
  <!-- Studio frame -->
  <rect x="4" y="4" width="112" height="112" rx="20" stroke="#171717" stroke-width="5"/>

  <!-- Variant cards — asymmetric bento grid -->
  <rect x="18" y="18" width="44" height="34" rx="8" fill="#171717"/>
  <rect x="68" y="18" width="34" height="34" rx="8" fill="#8a8a8a"/>
  <rect x="18" y="58" width="34" height="44" rx="8" fill="#8a8a8a"/>
  <rect x="58" y="58" width="44" height="44" rx="8" fill="#171717"/>

  <!-- === Wordmark === -->
  <!-- "UI" — bold weight -->
  <text x="138" y="62" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
        font-size="38" font-weight="700" fill="#171717" letter-spacing="-0.5">UI</text>

  <!-- "Studio" — regular weight -->
  <text x="138" y="98" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
        font-size="34" font-weight="400" fill="#171717" letter-spacing="0.5">Studio</text>
</svg>
