name: Deploy website to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Creates the Pages site (source: GitHub Actions) if it doesn't exist yet
      - uses: actions/configure-pages@v5
        with:
          enablement: true

      # configure-pages only creates the site; if it already exists with the
      # legacy branch source (Jekyll), try to switch it to GitHub Actions so the
      # legacy build can't overwrite this deployment. The endpoint needs admin
      # rights, so this may fail — then the source must be switched by hand:
      # Settings → Pages → Source: GitHub Actions.
      - name: Force Pages source to GitHub Actions
        run: |
          gh api "repos/${GITHUB_REPOSITORY}/pages" -X PUT -F build_type=workflow ||
            echo "::warning::Could not switch the Pages source (needs admin). Set Settings → Pages → Source to 'GitHub Actions' manually."
        env:
          GH_TOKEN: ${{ github.token }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build website (with workspace dependencies)
        run: pnpm --filter @dennation/website... run build
        env:
          VITE_BASE: /typebook/

      # SPA fallback: GitHub Pages serves 404.html for unknown paths,
      # so deep links like /typebook/docs/callout boot the app correctly.
      - name: Add SPA fallback
        run: cp apps/website/dist/index.html apps/website/dist/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/website/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
